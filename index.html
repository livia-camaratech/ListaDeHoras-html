<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consulta de Horas - Conservação e Limpeza</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', sans-serif;
    background-color: #e8f5e9;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(100, 160, 100, 0.13);
    max-width: 480px;
    width: 100%;
    padding: 44px 40px 36px;
  }

  .logo {
    text-align: center;
    margin-bottom: 28px;
  }

  .logo-icon {
    font-size: 38px;
    display: block;
    margin-bottom: 10px;
  }

  .logo h1 {
    font-size: 18px;
    font-weight: 700;
    color: #2e7d32;
    letter-spacing: 0.2px;
  }

  .logo p {
    font-size: 13px;
    color: #81a881;
    margin-top: 3px;
  }

  hr {
    border: none;
    border-top: 1px solid #e0ede0;
    margin: 0 0 28px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #4caf50;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .input-wrap input {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid #c8e6c9;
    border-radius: 10px;
    font-size: 15px;
    color: #2e4a2e;
    background: #f9fdf9;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }

  .input-wrap input:focus {
    border-color: #66bb6a;
    box-shadow: 0 0 0 3px rgba(102, 187, 106, 0.15);
    background: #fff;
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: #4caf50;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: #43a047; }
  .btn:active { transform: scale(0.99); }

  /* Result */
  .result {
    margin-top: 24px;
    display: none;
  }

  .result.show { display: block; animation: fadeUp 0.3s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-name {
    background: #f1f8f1;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 16px;
    border-left: 4px solid #66bb6a;
  }

  .result-name .tag {
    font-size: 11px;
    font-weight: 700;
    color: #81a881;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .result-name .name-text {
    font-size: 20px;
    font-weight: 700;
    color: #2e7d32;
    margin-top: 3px;
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .info-box {
    background: #f9fdf9;
    border: 1px solid #e0ede0;
    border-radius: 10px;
    padding: 13px 15px;
  }

  .info-box.full { grid-column: 1 / -1; }

  .info-box .tag {
    font-size: 11px;
    font-weight: 700;
    color: #81a881;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    margin-bottom: 4px;
  }

  .info-box .val {
    font-size: 14px;
    color: #2e4a2e;
    line-height: 1.5;
  }

  .hours-box {
    background: #f5f5f5;
    border: 1.5px solid #ddd;
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-top: 4px;
  }

  .hours-red {
    background: #ffe6e1;
    border: 1.5px solid #ff9982;
    color: #e74c3c;
}

.hours-green {
    background: #e8f8f0;
    border: 1.5px solid #4eaa51;
    color: #6fad71;
}

  .hours-box .hours-icon { font-size: 28px; }

  .hours-box .tag {
    font-size: 11px;
    font-weight: 700;
    color: #b8860b;
    text-transform: uppercase;
    letter-spacing: 0.7px;
  }

  .hours-box .val {
    font-size: 26px;
    font-weight: 800;
    color: #b8860b;
    line-height: 1.1;
  }

  /* Error */
  .error {
    margin-top: 16px;
    background: #fdecea;
    color: #c62828;
    border-left: 4px solid #ef9a9a;
    border-radius: 10px;
    padding: 13px 16px;
    font-size: 14px;
    display: none;
  }

  .error.show { display: block; animation: fadeUp 0.25s ease; }

  .hint {
    text-align: center;
    color: #a5c6a5;
    font-size: 12px;
    margin-top: 20px;
  }
</style>
</head>
<body>
<div class="card">

  <div class="logo">
    <span class="logo-icon">🧹</span>
    <h1>Conservação e Limpeza</h1>
    <p>Consulta de Horas - Janeiro à Março</p>
  </div>

  <hr>

  <label for="raInput">Digite seu RA</label>
  <div class="input-wrap">
    <input type="text" id="raInput" placeholder="Ex: 123456" autocomplete="off">
  </div>

  <button class="btn" onclick="search()">Consultar</button>

  <div id="result" class="result">
    <div class="result-name">
      <div class="tag">Aluno</div>
      <div class="name-text" id="dName">—</div>
    </div>

    <div class="info-grid">
      <div class="info-box">
        <div class="tag">RA</div>
        <div class="val" id="dRA">—</div>
      </div>
      <div class="info-box">
        <div class="tag">Prédio</div>
        <div class="val" id="dBuilding">—</div>
      </div>
      <div class="info-box full">
        <div class="tag">Datas das Faltas</div>
        <div class="val" id="dDates">—</div>
      </div>
      <div class="info-box full">
        <div class="tag">Observações</div>
        <div class="val" id="dObs">—</div>
      </div>
    </div>

    <div class="hours-box">
      <span class="hours-icon">⏳</span>
      <div>
        <div class="tag">Horas Devendo</div>
        <div class="val" id="dHours">—</div>
      </div>
    </div>
  </div>

  <div id="error" class="error">
    RA não encontrado. Verifique e tente novamente.
  </div>

  <p class="hint">Dúvidas? Procure o supervisor do setor ou a coordenação.</p>
</div>

  function search() {
    const ra = document.getElementById('raInput').value.trim();
    const resultEl = document.getElementById('result');
    const errorEl  = document.getElementById('error');

    resultEl.classList.remove('show');
    errorEl.classList.remove('show');

    const student = data.find(s => s.ra.toLowerCase() === ra.toLowerCase());

    if (student) {
     document.getElementById('dName').textContent     = student.name;
     document.getElementById('dRA').textContent       = student.ra;
     const hoursBox = document.querySelector('.hours-box');
     const hoursEl = document.getElementById('dHours');
     
     hoursEl.textContent = student.hoursOwed;
     
     const hoursValue = parseInt(student.hoursOwed);
        
     hoursBox.classList.remove('hours-red', 'hours-green');

     if (hoursValue > 0) {
        hoursBox.classList.add('hours-red');
    } else {
        hoursBox.classList.add('hours-green');
    }

  } else {
